# =============================================================================
# PARETO MULTI-OBJECTIVE - SERIAL TOPOLOGY
# =============================================================================
# Backlog costs [5,3,2] as specified in thesis

env:
  env_type: serial
  agent_num: 3
  lead_time: 2
  episode_len: 100
  action_dim: 41
  init_inventory: 20
  init_outstanding: 10
  holding_cost: [1.0, 1.0, 1.0]
  backlog_cost: [5.0, 3.0, 2.0]  # Thesis setting
  fixed_cost: 1.0
  eval_data_dir: "test_data/test_demand_merton"
  
  # Reward params
  service_bonus_scale: 10.0

agent:
  hidden_dim: 128
  critic_hidden_dim: 256
  actor_lr: 0.0001
  critic_lr: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  eps_clip: 0.2
  value_coef: 0.5
  entropy_coef: 0.05

training:
  episodes: 5000
  evaluate_every: 50
  use_ga: true
  ga_horizon: 5
  n_rollout_threads: 8
  early_stop: true
  n_warmup_evaluations: 10
  n_no_improvement_thres: 15
  min_improvement_delta: 0.01
  reduce_lr_on_plateau: true
  lr_reduction_factor: 0.5
  lr_reduction_patience: 5

heuristic:
  ga:
    pop_size: 15
    generations: 20
    mutation_rate: 0.1

pareto:
  weight_configs:
    - name: "cost_focused"
      cost_weight: 1.0
      service_weight: 0.0
    - name: "cost_leaning"
      cost_weight: 0.7
      service_weight: 0.3
    - name: "balanced"
      cost_weight: 0.5
      service_weight: 0.5
    - name: "service_leaning"
      cost_weight: 0.3
      service_weight: 0.7
    - name: "service_focused"
      cost_weight: 0.0
      service_weight: 1.0
  
  seeds: [1, 2, 3]
  output_dir: "results/pareto_serial"
